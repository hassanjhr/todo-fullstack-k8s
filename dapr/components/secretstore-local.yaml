apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: localsecrets
spec:
  type: secretstores.local.file
  version: v1
  metadata:
    # Path to the JSON secrets file — relative to where dapr run is executed
    - name: secretsFile
      value: "../dapr/secrets.json"
    # Separator for nested secret keys (e.g. db:url → stored as "db:url")
    - name: nestedSeparator
      value: ":"
