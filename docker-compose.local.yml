version: "3.9"

# Local Development Stack
# Runs: Zookeeper + Kafka + Dapr Placement + Backend + Dapr Sidecar + Frontend
#
# Usage:
#   Start:   docker compose -f docker-compose.local.yml up --build
#   Stop:    docker compose -f docker-compose.local.yml down
#   Logs:    docker compose -f docker-compose.local.yml logs -f backend
#   Kafka:   docker exec todo-kafka kafka-topics --bootstrap-server localhost:9092 --list

services:

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: todo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todo-net

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: todo-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # INTERNAL: used by containers (service name)
      # EXTERNAL: used by host machine (localhost)
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 8
    networks:
      - todo-net

  # ── Dapr Placement (actor service discovery) ────────────────────────────────
  placement:
    image: daprio/dapr:1.13.0
    container_name: todo-dapr-placement
    command: ["./placement", "--port", "50006", "--log-level", "info"]
    ports:
      - "50006:50006"
    networks:
      - todo-net

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    env_file: ./backend/.env
    environment:
      DAPR_ENABLED: "true"
      DAPR_HTTP_PORT: "3500"
      DAPR_PUBSUB_NAME: "taskpubsub"
      REMINDER_POLL_INTERVAL: "300"
      FRONTEND_URL: "http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - todo-net

  # ── Dapr Sidecar for Backend ─────────────────────────────────────────────────
  # Shares the backend network so backend can call http://localhost:3500
  backend-dapr:
    image: daprio/daprd:1.13.0
    container_name: todo-backend-dapr
    command:
      - ./daprd
      - --app-id=todo-backend
      - --app-port=8000
      - --dapr-http-port=3500
      - --placement-host-address=placement:50006
      - --components-path=/components
      - --log-level=info
    volumes:
      - ./dapr/components-docker:/components:ro
      - ./dapr/secrets.json:/secrets/secrets.json:ro
    network_mode: "service:backend"
    depends_on:
      - backend
      - placement
      - kafka

  # ── Frontend (Next.js dev server) ────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: todo-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules        # preserve node_modules inside container
      - /app/.next               # preserve .next build cache inside container
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - todo-net

networks:
  todo-net:
    driver: bridge
