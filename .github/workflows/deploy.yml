name: Build & Deploy to DigitalOcean Kubernetes

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/todo-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/todo-frontend

jobs:
  # ── Job 1: Build and push Docker images to GHCR ─────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx (ARM64 support)
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to DigitalOcean Kubernetes ────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl with DigitalOcean kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.DO_KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          kubectl cluster-info

      - name: Install Dapr CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/master/install/install.sh -O - | /bin/bash
          dapr --version

      - name: Install or upgrade Dapr on DOKS (idempotent)
        run: |
          dapr status -k 2>/dev/null && \
            dapr upgrade --kubernetes --wait || \
            dapr init --kubernetes --wait
          dapr status -k

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.14.0'

      - name: Deploy with Helm
        run: |
          helm upgrade --install todo-chatbot ./todo-chatbot \
            --atomic \
            --timeout 10m \
            --set dapr.enabled=true \
            --set backend.image.repository=${{ env.BACKEND_IMAGE }} \
            --set backend.image.tag=${{ github.sha }} \
            --set backend.image.pullPolicy=Always \
            --set frontend.image.repository=${{ env.FRONTEND_IMAGE }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set frontend.image.pullPolicy=Always \
            --set frontend.service.type=LoadBalancer \
            --set env.DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --set env.JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
            --set env.OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --set frontendEnv.NEXT_PUBLIC_API_URL="http://todo-chatbot-backend:8000" \
            --set frontendEnv.NEXT_PUBLIC_DAPR_ENABLED="true"

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/todo-chatbot-backend --timeout=5m
          kubectl rollout status deployment/todo-chatbot-frontend --timeout=5m
          echo "✅ Deployment successful!"
          kubectl get pods
          kubectl get svc todo-chatbot-frontend
