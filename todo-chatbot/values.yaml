# Default values for todo-chatbot local Minikube deployment

replicaCount: 1

# Backend (FastAPI)
backend:
  image:
    repository: todo-backend
    tag: "latest"
    pullPolicy: Never  # Use local Docker images (Minikube)
  service:
    type: NodePort
    port: 8000
    nodePort: 30800
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10

# Frontend (Next.js)
frontend:
  image:
    repository: todo-frontend
    tag: "latest"
    pullPolicy: Never  # Use local Docker images (Minikube)
  service:
    type: NodePort
    port: 3000
    nodePort: 30300
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 10

# Environment variables for the backend
# Sensitive values should be passed via --set or a secrets file
env:
  DATABASE_URL: ""
  JWT_SECRET_KEY: ""
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"
  FRONTEND_URL: "http://localhost:30300"
  BACKEND_HOST: "0.0.0.0"
  BACKEND_PORT: "8000"
  ENVIRONMENT: "development"
  OPENAI_API_KEY: ""
  OPENAI_MODEL: "gpt-4o"
  # Dapr / Kafka (only used when dapr.enabled=true)
  DAPR_ENABLED: "false"
  DAPR_HTTP_PORT: "3500"
  DAPR_PUBSUB_NAME: "taskpubsub"
  REMINDER_POLL_INTERVAL: "300"

# Frontend environment (baked at build time, but can be overridden)
frontendEnv:
  NEXT_PUBLIC_API_URL: "http://localhost:30800"

# Dapr distributed runtime
# Minikube: helm upgrade --set dapr.enabled=true (also sets DAPR_ENABLED env)
# Local:    docker-compose.kafka.yml + dapr run CLI (dapr.enabled=false here)
dapr:
  enabled: false

# Kafka broker configuration
# Minikube (internal K8s service): kafka:9092
# Local dev (Docker):               localhost:9092
kafka:
  brokers: "kafka:9092"

# Service account
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Ingress (disabled for local Minikube - using NodePort instead)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: todo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# HTTPRoute (disabled for local)
httpRoute:
  enabled: false

# Autoscaling (disabled for local)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
volumes: []
volumeMounts: []
