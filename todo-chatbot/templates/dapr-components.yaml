{{- if .Values.dapr.enabled }}
---
# Dapr Pub/Sub Component — Kafka (Building Block 1)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: taskpubsub
  namespace: {{ .Release.Namespace }}
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      value: {{ .Values.kafka.brokers | quote }}
    - name: consumerGroup
      value: "todo-chatbot"
    - name: authRequired
      value: "false"
    - name: authType
      value: "none"
    - name: maxRetries
      value: "3"
    - name: deadLetterTopic
      value: "tasks-dlq"
    - name: autoCreateTopics
      value: "true"
  scopes:
    - todo-backend
---
# Dapr State Store — Redis (Building Block 2)
# Redis is auto-installed by: dapr init --kubernetes
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: {{ .Release.Namespace }}
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "redis-master:6379"
    - name: redisPassword
      value: ""
    - name: actorStateStore
      value: "true"
  scopes:
    - todo-backend
---
# Dapr Cron Binding — Reminder Scheduler (Building Block 3)
# Triggers POST /reminder-cron on the backend at configured interval
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: reminder-cron
  namespace: {{ .Release.Namespace }}
spec:
  type: bindings.cron
  version: v1
  metadata:
    - name: schedule
      value: {{ .Values.dapr.cronSchedule | default "@every 5m" | quote }}
  scopes:
    - todo-backend
---
# Dapr Secrets Store — Kubernetes Secrets (Building Block 4)
# Reads from K8s Secrets in the same namespace as the app
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: k8ssecrets
  namespace: {{ .Release.Namespace }}
spec:
  type: secretstores.kubernetes
  version: v1
  metadata: []
  scopes:
    - todo-backend
    - todo-frontend
# Note: Building Block 5 — Service Invocation — is built into Dapr (no component YAML needed).
# mTLS is enforced automatically between all Dapr-enabled pods.
# Frontend calls backend via: http://localhost:3500/v1.0/invoke/todo-backend/method/<path>
{{- end }}
