apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todo-chatbot.fullname" . }}-backend-secret
  labels:
    {{- include "todo-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.env.DATABASE_URL | quote }}
  JWT_SECRET_KEY: {{ .Values.env.JWT_SECRET_KEY | quote }}
  JWT_ALGORITHM: {{ .Values.env.JWT_ALGORITHM | quote }}
  JWT_EXPIRATION_HOURS: {{ .Values.env.JWT_EXPIRATION_HOURS | quote }}
  FRONTEND_URL: {{ .Values.env.FRONTEND_URL | quote }}
  BACKEND_HOST: {{ .Values.env.BACKEND_HOST | quote }}
  BACKEND_PORT: {{ .Values.env.BACKEND_PORT | quote }}
  ENVIRONMENT: {{ .Values.env.ENVIRONMENT | quote }}
  OPENAI_API_KEY: {{ .Values.env.OPENAI_API_KEY | quote }}
  OPENAI_MODEL: {{ .Values.env.OPENAI_MODEL | quote }}
